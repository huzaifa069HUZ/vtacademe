    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnXG_U4eWP_lS-5SyoPfk9h0WdVNAZbYc",
            authDomain: "vt-academy-37e0e.firebaseapp.com",
            projectId: "vt-academy-37e0e",
            storageBucket: "vt-academy-37e0e.firebasestorage.app",
            messagingSenderId: "498511573525",
            appId: "1:498511573525:web:4e41cd8322a1c813f2941c",
            measurementId: "G-8KZ5F4JBGE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchNotes() {
            const container = document.getElementById('notes-container');
            const loader = document.getElementById('notes-loader');
            const filterBar = document.getElementById('filter-bar');
            
            try {
                const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                // Group notes: Class -> Subject -> [notes]
                const notesByClass = {};
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const className = data.class || 'Other';
                    const subject = data.subject || 'General';
                    if (!notesByClass[className]) {
                        notesByClass[className] = {};
                    }
                    if (!notesByClass[className][subject]) {
                        notesByClass[className][subject] = [];
                    }
                    notesByClass[className][subject].push({ id: doc.id, ...data });
                });
                
                loader.classList.add('hidden');
                
                const classes = Object.keys(notesByClass).sort((a,b) => {
                    const numA = parseInt(a.replace(/\D/g, '')) || 0;
                    const numB = parseInt(b.replace(/\D/g, '')) || 0;
                    return numA - numB;
                });

                if (classes.length === 0) {
                    container.innerHTML = `<div class="w-full text-center py-20 text-[#546877] font-medium text-lg border border-[#161311]/10 rounded-3xl bg-white shadow-sm">No notes available at the moment. Check back later!</div>`;
                    return;
                }
                
                // Render Filters
                renderFilters(classes);

                const subjectColors = {
                    'Physics': { bg: 'bg-blue-50', text: 'text-blue-600', border: 'border-blue-200', icon: '⚡' },
                    'Chemistry': { bg: 'bg-emerald-50', text: 'text-emerald-600', border: 'border-emerald-200', icon: '🧪' },
                    'Biology': { bg: 'bg-green-50', text: 'text-green-600', border: 'border-green-200', icon: '🧬' },
                    'Maths': { bg: 'bg-purple-50', text: 'text-purple-600', border: 'border-purple-200', icon: '📐' },
                    'SST': { bg: 'bg-amber-50', text: 'text-amber-600', border: 'border-amber-200', icon: '🌍' },
                    'General': { bg: 'bg-slate-50', text: 'text-slate-600', border: 'border-slate-200', icon: '📄' }
                };
                
                let html = '';
                classes.forEach((className, index) => {
                    const delay = index * 0.1;
                    const subjects = Object.keys(notesByClass[className]).sort();

                    html += `
                        <div class="class-section w-full mb-16 animate-[fadeInUp_0.8s_ease-out_both] transition-all duration-500" 
                             data-class="${className}" 
                             style="animation-delay: ${delay}s">
                            <div class="flex items-center gap-4 mb-8">
                                <h2 class="text-4xl md:text-5xl font-black text-[#161311] title-font tracking-wide">${className}</h2>
                                <div class="h-[2px] flex-grow bg-gradient-to-r from-[#ff771c]/50 via-[#546877]/20 to-transparent rounded-full"></div>
                            </div>
                    `;

                    subjects.forEach(subject => {
                        const colors = subjectColors[subject] || subjectColors['General'];
                        html += `
                            <div class="mb-10">
                                <div class="flex items-center gap-3 mb-6">
                                    <span class="text-2xl">${colors.icon}</span>
                                    <h3 class="text-xl md:text-2xl font-bold text-[#161311]">${subject}</h3>
                                    <span class="px-3 py-1 ${colors.bg} ${colors.text} text-[10px] font-black uppercase rounded-full tracking-widest border ${colors.border}">${notesByClass[className][subject].length} notes</span>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-8">
                        `;

                        notesByClass[className][subject].forEach(note => {
                            const dateStr = note.createdAt ? new Date(note.createdAt.toDate()).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' }) : 'Unknown Date';
                            const noteColors = subjectColors[note.subject] || subjectColors['General'];
                            html += `
                                <div class="bg-white rounded-[2rem] p-8 border border-[#161311]/5 hover:border-[#ff771c]/50 transition-all duration-500 group shadow-lg flex flex-col justify-between h-full transform hover:-translate-y-2">
                                    <div>
                                        <div class="flex items-center gap-3 mb-6">
                                            <div class="w-14 h-14 ${noteColors.bg} rounded-2xl flex items-center justify-center text-2xl group-hover:bg-[#ff771c] group-hover:text-white transition-all duration-500">
                                                ${noteColors.icon}
                                            </div>
                                            <span class="px-3 py-1 ${noteColors.bg} ${noteColors.text} text-[10px] font-black uppercase rounded-full tracking-widest border ${noteColors.border}">${note.subject || 'General'}</span>
                                        </div>
                                        <h3 class="text-2xl font-bold text-[#161311] mb-3 line-clamp-2 leading-tight group-hover:text-[#ff771c] transition-colors">${note.title}</h3>
                                        <p class="text-sm font-medium text-[#546877] mb-8 flex items-center gap-2">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                            ${dateStr}
                                        </p>
                                    </div>
                                    <button onclick="window.viewNote('${note.fileUrl || note.base64}', '${note.fileUrl ? 'url' : 'base64'}', '${note.title}')" class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-[#f5ede0] border border-[#ff771c]/20 text-[#ff771c] font-bold rounded-xl hover:bg-[#ff771c] hover:text-white hover:border-transparent transition-all duration-300 overflow-hidden relative">
                                        <span class="relative z-10 flex items-center gap-2">
                                            <svg class="w-5 h-5 group-hover:animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                            View Note
                                        </span>
                                    </button>
                                </div>
                            `;
                        });

                        html += `</div></div>`;
                    });
                    
                    html += `</div>`;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error("Error fetching notes:", error);
                loader.classList.add('hidden');
                container.innerHTML = `<div class="w-full text-center py-20 text-red-500 font-medium">Failed to load notes. Please try again later.</div>`;
            }
        }

        function renderFilters(classes) {
            const filterBar = document.getElementById('filter-bar');
            filterBar.innerHTML = '';
            filterBar.classList.remove('hidden');
            
            // All classes button
            filterBar.appendChild(createFilterBtn('All Materials', 'all'));
            
            // Individual class buttons
            classes.forEach(cls => {
                filterBar.appendChild(createFilterBtn(cls, cls));
            });
        }

        function createFilterBtn(label, value) {
            const btn = document.createElement('button');
            btn.className = 'filter-btn px-6 py-2.5 rounded-full border border-[#161311]/10 bg-white text-sm font-bold text-[#546877] transition-all duration-500 hover:border-[#ff771c] hover:text-[#ff771c] active:scale-95 shadow-sm';
            btn.dataset.filter = value;
            btn.textContent = label;
            
            if (value === 'all') {
                btn.classList.add('active-filter', 'bg-[#ff771c]', 'text-white', 'border-[#ff771c]');
            }
            
            btn.onclick = () => {
                // Update active state
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-[#ff771c]', 'text-white', 'border-[#ff771c]');
                    b.classList.add('bg-white', 'text-[#546877]', 'border-[#161311]/10');
                });
                btn.classList.add('bg-[#ff771c]', 'text-white', 'border-[#ff771c]');
                btn.classList.remove('bg-white', 'text-[#546877]', 'border-[#161311]/10');
                
                // Filter content
                const sections = document.querySelectorAll('.class-section');
                sections.forEach(section => {
                    if (value === 'all' || section.dataset.class === value) {
                        section.classList.remove('hidden');
                        section.style.opacity = '1';
                        section.style.transform = 'translateY(0)';
                    } else {
                        section.classList.add('hidden');
                        section.style.opacity = '0';
                        section.style.transform = 'translateY(20px)';
                    }
                });
            };
            
            return btn;
        }

        window.viewNote = (content, type, title) => {
            if (type === 'url') {
                const overlay = document.createElement('div');
                overlay.id = 'pdf-viewer-overlay';
                overlay.className = 'fixed inset-0 z-[100] bg-[#161311] flex flex-col select-none';
                overlay.style.animation = 'fadeIn 0.3s ease-out';
                overlay.oncontextmenu = (e) => { e.preventDefault(); return false; };
                
                overlay.innerHTML = `
                    <div class="flex justify-between items-center p-4 bg-[#0a0807] text-white border-b border-white/10 shrink-0 z-50">
                        <div class="flex items-center gap-4">
                            <button id="close-viewer-btn" class="p-2 bg-white/10 rounded-lg hover:bg-white/20 transition-colors">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <h3 class="font-bold text-lg text-white truncate max-w-[60vw]">${title}</h3>
                        </div>
                        <div class="flex items-center gap-3">
                            <span id="page-counter" class="text-xs font-bold text-slate-400 bg-white/5 px-3 py-1.5 rounded-lg"></span>
                            <div class="text-sm font-medium text-[#ff771c] bg-[#ff771c]/10 px-4 py-2 rounded-lg pointer-events-none flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                Secure
                            </div>
                        </div>
                    </div>
                    
                    <div class="fixed inset-0 pointer-events-none z-10 flex items-center justify-center opacity-[0.04]">
                        <img src="logo-with-text.png" class="w-[80vw] object-contain rotate-[-30deg]" draggable="false">
                    </div>

                    <div id="pdf-container" class="flex-1 w-full overflow-y-auto overflow-x-hidden bg-[#1a1714] relative z-20 py-8 px-4 flex flex-col items-center gap-4">
                        <div id="pdf-loading" class="text-white flex flex-col items-center justify-center my-auto">
                            <div class="w-14 h-14 border-4 border-[#ff771c]/30 border-t-[#ff771c] rounded-full animate-spin mb-5"></div>
                            <p class="text-sm font-bold tracking-widest uppercase text-[#ff771c]">Loading Pages...</p>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.body.style.overflow = 'hidden';

                // Close button handler
                document.getElementById('close-viewer-btn').onclick = () => {
                    overlay.remove();
                    document.body.style.overflow = '';
                    window.removeEventListener('blur', blurHandler);
                    window.removeEventListener('focus', focusHandler);
                };

                // Anti-screenshot blur
                const blurHandler = () => { if(document.getElementById('pdf-viewer-overlay')) document.getElementById('pdf-viewer-overlay').style.filter = 'blur(20px)'; };
                const focusHandler = () => { if(document.getElementById('pdf-viewer-overlay')) document.getElementById('pdf-viewer-overlay').style.filter = 'none'; };
                window.addEventListener('blur', blurHandler);
                window.addEventListener('focus', focusHandler);

                // Block keyboard shortcuts (Ctrl+S, Ctrl+P, PrintScreen)
                const keyHandler = (e) => {
                    if ((e.ctrlKey && (e.key === 's' || e.key === 'p')) || e.key === 'PrintScreen') {
                        e.preventDefault();
                        return false;
                    }
                };
                document.addEventListener('keydown', keyHandler);

                // Cloudinary page-by-page image rendering
                const container = document.getElementById('pdf-container');
                const loading = document.getElementById('pdf-loading');
                const pageCounter = document.getElementById('page-counter');

                // Convert Cloudinary PDF URL to page image URL
                // URL format: .../image/upload/v123/folder/file.pdf
                // Page image: .../image/upload/pg_N,w_1200,f_auto,q_auto/v123/folder/file.pdf
                const urlParts = content.split('/upload/');
                if (urlParts.length === 2) {
                    let pageNum = 1;
                    let loadedCount = 0;
                    const maxPages = 200; // safety limit

                    const loadPage = (num) => {
                        const pageUrl = `${urlParts[0]}/upload/pg_${num},w_1200,f_auto,q_auto/${urlParts[1]}`;
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.draggable = false;
                        img.oncontextmenu = () => false;
                        
                        img.onload = () => {
                            if (loading && loading.parentNode) loading.remove();
                            
                            const wrapper = document.createElement('div');
                            wrapper.className = 'relative max-w-[900px] w-full';
                            wrapper.style.animation = 'fadeIn 0.4s ease-out';
                            
                            img.className = 'w-full h-auto rounded-lg shadow-[0_4px_30px_rgba(0,0,0,0.4)] select-none';
                            img.style.cssText = 'pointer-events: none; -webkit-user-drag: none; user-select: none;';
                            
                            wrapper.appendChild(img);
                            container.appendChild(wrapper);
                            
                            loadedCount++;
                            pageCounter.textContent = `${loadedCount} pages`;
                            
                            // Load next page
                            if (num < maxPages) {
                                loadPage(num + 1);
                            }
                        };
                        
                        img.onerror = () => {
                            // No more pages — done loading
                            if (loading && loading.parentNode) loading.remove();
                            if (loadedCount === 0) {
                                container.innerHTML = `<p class="text-red-400 font-bold text-center my-auto">Could not load this PDF. Please try again.</p>`;
                            }
                            // Clean up keyboard handler when viewer is closed
                            const closeBtn = document.getElementById('close-viewer-btn');
                            if (closeBtn) {
                                const origClick = closeBtn.onclick;
                                closeBtn.onclick = () => {
                                    document.removeEventListener('keydown', keyHandler);
                                    if (origClick) origClick();
                                };
                            }
                        };
                        
                        img.src = pageUrl;
                    };
                    
                    loadPage(1);
                } else {
                    // URL format not recognized, try iframe fallback
                    loading.remove();
                    container.innerHTML = `
                        <div class="relative w-full" style="height: calc(100vh - 80px);">
                            <iframe src="${content}#toolbar=0&navpanes=0" class="w-full h-full border-none rounded-lg"></iframe>
                            <div class="absolute top-0 left-0 w-full h-12 bg-[#161311] z-30"></div>
                        </div>
                    `;
                }
                
            } else {
                window.downloadBase64PDF(content, title);
            }
        };

        window.downloadBase64PDF = (base64String, title) => {
            try {
                let pdfURI = base64String;
                if (!base64String.startsWith('data:application/pdf;base64,')) {
                    pdfURI = 'data:application/pdf;base64,' + base64String;
                }
                
                const link = document.createElement('a');
                link.href = pdfURI;
                link.download = `${title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.pdf`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                alert("Could not download file. It might be corrupted.");
                console.error(err);
            }
        };

        document.addEventListener('DOMContentLoaded', fetchNotes);
    </script>
</head>
