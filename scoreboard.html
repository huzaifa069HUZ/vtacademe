    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnXG_U4eWP_lS-5SyoPfk9h0WdVNAZbYc",
            authDomain: "vt-academy-37e0e.firebaseapp.com",
            projectId: "vt-academy-37e0e",
            storageBucket: "vt-academy-37e0e.firebasestorage.app",
            messagingSenderId: "498511573525",
            appId: "1:498511573525:web:4e41cd8322a1c813f2941c",
            measurementId: "G-8KZ5F4JBGE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeTest = null;
        let activeClass = 'all';
        let allEntries = [];

        async function loadScoreboard() {
            const testBar = document.getElementById('test-filter-bar');
            const loader = document.getElementById('scoreboard-loader');
            const container = document.getElementById('scoreboard-container');
            const emptyState = document.getElementById('scoreboard-empty');

            try {
                const snap = await getDocs(collection(db, 'scoreboard'));
                const testMap = {};

                snap.forEach((doc) => {
                    const data = doc.data();
                    allEntries.push({ id: doc.id, ...data });
                    const name = data.testName || 'Untitled';
                    if (!testMap[name]) {
                        testMap[name] = { count: 0, date: data.date || '' };
                    }
                    testMap[name].count++;
                });

                loader.classList.add('hidden');

                const testNames = Object.keys(testMap).sort();

                if (testNames.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                // Check URL params for pre-selected test
                const urlParams = new URLSearchParams(window.location.search);
                const preselected = urlParams.get('test');

                // Render test filter pills
                testBar.classList.remove('hidden');
                let pillsHtml = '';
                testNames.forEach((name) => {
                    const info = testMap[name];
                    pillsHtml += `<button onclick="window.selectTest('${name.replace(/'/g, "\\'")}')" 
                        data-test="${name}"
                        class="test-pill px-6 py-2.5 rounded-full border border-[#161311]/10 bg-white text-sm font-bold text-[#546877] transition-all duration-500 hover:border-[#ff771c] hover:text-[#ff771c] active:scale-95 shadow-sm whitespace-nowrap">
                        ${name} <span class="text-[10px] ml-1 opacity-50">(${info.count})</span>
                    </button>`;
                });
                testBar.innerHTML = pillsHtml;

                // Auto-select from URL or first test
                if (preselected && testNames.includes(preselected)) {
                    window.selectTest(preselected);
                } else {
                    window.selectTest(testNames[0]);
                }

            } catch (error) {
                console.error("Error fetching scoreboard:", error);
                loader.classList.add('hidden');
                container.innerHTML = `<div class="w-full text-center py-20 text-red-500 font-medium">Failed to load scoreboard. Please try again later.</div>`;
            }
        }

        window.selectTest = function(testName) {
            activeTest = testName;
            activeClass = 'all';

            // Update pill styles
            document.querySelectorAll('.test-pill').forEach(btn => {
                if (btn.dataset.test === testName) {
                    btn.classList.add('bg-[#ff771c]', 'text-white', 'border-[#ff771c]');
                    btn.classList.remove('bg-white', 'text-[#546877]', 'border-[#161311]/10');
                } else {
                    btn.classList.remove('bg-[#ff771c]', 'text-white', 'border-[#ff771c]');
                    btn.classList.add('bg-white', 'text-[#546877]', 'border-[#161311]/10');
                }
            });

            renderLeaderboard();
        };

        window.filterClass = function(cls) {
            activeClass = cls;

            // Update class pill styles
            document.querySelectorAll('.class-pill').forEach(btn => {
                if (btn.dataset.cls === cls) {
                    btn.classList.add('bg-[#546877]', 'text-white', 'border-[#546877]');
                    btn.classList.remove('bg-white', 'text-[#546877]', 'border-[#161311]/10');
                } else {
                    btn.classList.remove('bg-[#546877]', 'text-white', 'border-[#546877]');
                    btn.classList.add('bg-white', 'text-[#546877]', 'border-[#161311]/10');
                }
            });

            renderLeaderboard();
        };

        function renderLeaderboard() {
            const container = document.getElementById('scoreboard-container');
            const titleEl = document.getElementById('active-test-name');
            
            if (!activeTest) return;
            titleEl.textContent = activeTest;

            // Filter entries for this test
            let entries = allEntries.filter(e => e.testName === activeTest);

            // Get unique classes for class filter
            const classes = new Set();
            entries.forEach(e => { if (e.course) classes.add(e.course); });

            // Apply class filter
            if (activeClass !== 'all') {
                entries = entries.filter(e => e.course === activeClass);
            }

            // Sort by percentage descending
            entries.sort((a, b) => {
                if (b.percentage !== a.percentage) return b.percentage - a.percentage;
                return (b.obtained || 0) - (a.obtained || 0);
            });

            // Build class filter bar
            let classHtml = '<div id="class-filter-bar" class="flex flex-wrap justify-center gap-2 mb-10">';
            classHtml += `<button onclick="window.filterClass('all')" data-cls="all" 
                class="class-pill px-4 py-2 rounded-full text-xs font-bold transition-all duration-300 border ${activeClass === 'all' ? 'bg-[#546877] text-white border-[#546877]' : 'bg-white text-[#546877] border-[#161311]/10'} shadow-sm">
                All Classes</button>`;
            classes.forEach(cls => {
                classHtml += `<button onclick="window.filterClass('${cls}')" data-cls="${cls}"
                    class="class-pill px-4 py-2 rounded-full text-xs font-bold transition-all duration-300 border ${activeClass === cls ? 'bg-[#546877] text-white border-[#546877]' : 'bg-white text-[#546877] border-[#161311]/10'} shadow-sm">
                    ${cls}</button>`;
            });
            classHtml += '</div>';

            if (entries.length === 0) {
                container.innerHTML = classHtml + `<div class="w-full text-center py-16 text-[#546877] font-medium text-lg border border-[#161311]/10 rounded-3xl bg-white shadow-sm">No results for this filter.</div>`;
                return;
            }

            let html = classHtml;

            // Top 3 podium for desktop
            if (entries.length >= 3) {
                html += `<div class="hidden md:grid grid-cols-3 gap-6 mb-12 max-w-3xl mx-auto">`;
                
                // Second place (left)
                const second = entries[1];
                html += buildPodiumCard(second, 2, 'from-slate-100 to-white', 'border-slate-300', '🥈', 'medal-glow-silver');
                
                // First place (center, taller)
                const first = entries[0];
                html += `<div class="-mt-4">` + buildPodiumCard(first, 1, 'from-yellow-50 to-white', 'border-yellow-300', '🥇', 'medal-glow-gold') + `</div>`;
                
                // Third place (right)
                const third = entries[2];
                html += buildPodiumCard(third, 3, 'from-orange-50 to-white', 'border-orange-300', '🥉', 'medal-glow-bronze');
                
                html += `</div>`;

                // Top 3 podium for mobile (stacked: 1st biggest, 2nd medium, 3rd smaller)
                html += `<div class="md:hidden flex flex-col items-center gap-4 mb-10 px-2">`;
                
                // 1st place - full width, large
                html += `<div class="w-full max-w-sm">` + buildPodiumCard(entries[0], 1, 'from-yellow-50 to-white', 'border-yellow-300', '🥇', 'medal-glow-gold') + `</div>`;
                
                // 2nd place - slightly narrower
                html += `<div class="w-[88%] max-w-xs">` + buildPodiumCard(entries[1], 2, 'from-slate-100 to-white', 'border-slate-300', '🥈', 'medal-glow-silver') + `</div>`;
                
                // 3rd place - even narrower
                html += `<div class="w-[76%] max-w-[280px]">` + buildPodiumCard(entries[2], 3, 'from-orange-50 to-white', 'border-orange-300', '🥉', 'medal-glow-bronze') + `</div>`;
                
                html += `</div>`;
            }

            // Full ranking list
            html += `<div class="space-y-3 max-w-3xl mx-auto">`;
            entries.forEach((entry, index) => {
                const rank = index + 1;
                const delay = Math.min(index * 0.05, 1);
                html += buildRankRow(entry, rank, delay);
            });
            html += `</div>`;

            html += `<div class="text-center mt-8"><span class="text-xs font-bold text-[#546877]/60 uppercase tracking-widest">${entries.length} student${entries.length !== 1 ? 's' : ''} ranked</span></div>`;

            container.innerHTML = html;
        }

        function buildPodiumCard(entry, rank, gradient, border, medal, glowClass) {
            const perc = entry.percentage || 0;
            const initials = (entry.studentName || 'U').split(' ').map(w => w.charAt(0)).join('').slice(0, 2).toUpperCase();
            const avatarHtml = entry.studentPhoto 
                ? `<img src="${entry.studentPhoto}" class="w-full h-full object-cover rounded-2xl" alt="">`
                : `<span class="text-lg font-black text-[#546877]">${initials}</span>`;

            return `
                <div class="bg-gradient-to-b ${gradient} rounded-3xl border-2 ${border} p-6 text-center shadow-lg ${glowClass} leaderboard-entry">
                    <div class="text-4xl mb-3">${medal}</div>
                    <div class="w-16 h-16 rounded-2xl bg-white border-2 ${border} mx-auto mb-4 flex items-center justify-center overflow-hidden shadow-sm">
                        ${avatarHtml}
                    </div>
                    <h3 class="text-lg font-black text-[#161311] mb-1 truncate">${entry.studentName || 'Unknown'}</h3>
                    ${entry.course ? `<span class="text-[10px] font-bold uppercase tracking-widest text-[#546877] bg-[#546877]/10 px-3 py-1 rounded-full">${entry.course}</span>` : ''}
                    <div class="mt-4">
                        <div class="text-3xl font-black text-[#161311]">${perc}<span class="text-lg text-[#546877]">%</span></div>
                        <div class="text-xs font-bold text-[#546877] mt-1">${entry.obtained || 0} / ${entry.total || 0}</div>
                    </div>
                </div>
            `;
        }

        function buildRankRow(entry, rank, delay) {
            const perc = entry.percentage || 0;
            const percColor = perc >= 75 ? 'text-emerald-600' : perc >= 60 ? 'text-blue-600' : perc >= 45 ? 'text-yellow-600' : 'text-red-600';
            const barColor = perc >= 75 ? 'bg-emerald-500' : perc >= 60 ? 'bg-blue-500' : perc >= 45 ? 'bg-yellow-500' : 'bg-red-500';
            const bgColor = perc >= 75 ? 'from-emerald-500/5' : perc >= 60 ? 'from-blue-500/5' : perc >= 45 ? 'from-yellow-500/5' : 'from-red-500/5';

            let medalHtml = '';
            if (rank === 1) medalHtml = `<div class="w-10 h-10 rounded-xl bg-yellow-100 border border-yellow-300 flex items-center justify-center text-xl shrink-0 shadow-sm">🥇</div>`;
            else if (rank === 2) medalHtml = `<div class="w-10 h-10 rounded-xl bg-slate-100 border border-slate-300 flex items-center justify-center text-xl shrink-0 shadow-sm">🥈</div>`;
            else if (rank === 3) medalHtml = `<div class="w-10 h-10 rounded-xl bg-orange-100 border border-orange-300 flex items-center justify-center text-xl shrink-0 shadow-sm">🥉</div>`;
            else medalHtml = `<div class="w-10 h-10 rounded-xl bg-white border border-[#161311]/10 flex items-center justify-center text-sm font-black text-[#546877] shrink-0">${rank}</div>`;

            const initials = (entry.studentName || 'U').split(' ').map(w => w.charAt(0)).join('').slice(0, 2).toUpperCase();
            const avatarHtml = entry.studentPhoto 
                ? `<img src="${entry.studentPhoto}" class="w-full h-full object-cover rounded-xl" alt="">`
                : `<span class="text-[11px] font-black text-[#546877]">${initials}</span>`;

            const rankHighlight = rank <= 3 ? 'border-[#ff771c]/20 shadow-md' : 'border-[#161311]/5';

            return `
                <div class="leaderboard-entry flex items-center gap-3 sm:gap-4 p-4 sm:p-5 bg-gradient-to-r ${bgColor} to-white rounded-2xl border ${rankHighlight} hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300" style="animation-delay: ${delay}s">
                    ${medalHtml}
                    <div class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl bg-white border border-[#161311]/10 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">
                        ${avatarHtml}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-sm sm:text-base font-bold text-[#161311] truncate">${entry.studentName || 'Unknown'}</span>
                            ${entry.course ? `<span class="text-[9px] font-bold uppercase px-2 py-0.5 rounded-md bg-[#546877]/10 text-[#546877] shrink-0 hidden sm:inline">${entry.course}</span>` : ''}
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex-1 h-2 bg-[#161311]/5 rounded-full overflow-hidden">
                                <div class="h-full rounded-full ${barColor} transition-all duration-1000" style="width:${perc}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="text-right shrink-0">
                        <div class="text-base sm:text-lg font-black ${percColor}">${perc}%</div>
                        <div class="text-[10px] font-bold text-[#546877]/60">${entry.obtained || 0}/${entry.total || 0}</div>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadScoreboard);
    </script>
</head>
